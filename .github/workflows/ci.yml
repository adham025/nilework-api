name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    # Placeholder env so the app boots during tests (core/env validates at import).
    # Tests never connect to these — guards just assert 401s; DB lookups degrade
    # gracefully. Real values live in Fly secrets.
    env:
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Mirrors the local pre-push hook: build schemas, typecheck, lint, test, build.
      - run: npm run ci
