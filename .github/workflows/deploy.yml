name: Deploy

# Deploys to Fly only after the CI workflow succeeds on main, so a red build
# never ships. Requires repo secret FLY_API_TOKEN (create with:
#   fly tokens create deploy
# then add it under Settings → Secrets and variables → Actions).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    concurrency: deploy-api
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # release_command in fly.toml runs the migrations before the new version
      # goes live; runtime secrets are set once via `fly secrets set ...`.
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
